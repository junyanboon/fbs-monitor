name: Rebuild FBS Monitor

on:
  # PRIMARY trigger: the cloud RemoteTrigger driver writes a new timestamp to
  # `.rebuild-tick` (via Zapier's GitHub Create-or-Update-File) every ~15 min.
  # Scheduling on claude.ai is reliable; GitHub's own cron is not (it throttles
  # this repo's scheduled runs to ~1/hour regardless of frequency). Path-scoped
  # so the build's own index.html commit can never re-trigger the workflow.
  push:
    paths:
      - ".rebuild-tick"
  # BACKUP trigger: GitHub cron. Delivers only ~hourly here (best-effort, heavily
  # throttled on low-traffic repos), so it's a safety net behind the driver, not
  # the primary. build.py gates execution to 07:00-02:59 America/Toronto.
  schedule:
    - cron: "3-59/15 * * * *"
  workflow_dispatch:          # manual "Run workflow" button — bypasses the time gate
    inputs:
      debug_arm:
        description: "Log how each ADT subject parses (public logs — subjects only)"
        default: false
        type: boolean

concurrency:
  group: rebuild
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Skip cleanly (green, not red) until secrets are configured, so scheduled runs
      # before setup don't email a failure every 15 minutes.
      - name: Gate on setup
        id: gate
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          if [ -z "$NOTION_TOKEN" ]; then
            echo "::notice::NOTION_TOKEN not set — setup incomplete, skipping this run."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.gate.outputs.ready == 'true'
        with:
          python-version: "3.12"

      - name: Install deps
        if: steps.gate.outputs.ready == 'true'
        run: pip install -r requirements.txt

      - name: Build index.html
        if: steps.gate.outputs.ready == 'true'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          ICS_URL_509A: ${{ secrets.ICS_URL_509A }}
          ICS_URL_509B: ${{ secrets.ICS_URL_509B }}
          ICS_URL_527: ${{ secrets.ICS_URL_527 }}
          ICS_URL_693: ${{ secrets.ICS_URL_693 }}
          ICS_URL_901: ${{ secrets.ICS_URL_901 }}
          ICS_URL_STAFF: ${{ secrets.ICS_URL_STAFF }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          # Manual dispatch bypasses the 07:00–24:00 Toronto gate; cron respects it.
          FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
          DEBUG_ARM: ${{ github.event.inputs.debug_arm == 'true' && '1' || '0' }}
        run: python build.py

      - name: Commit if changed
        if: steps.gate.outputs.ready == 'true'
        run: |
          git config user.name "fbs-monitor-bot"
          git config user.email "actions@github.com"
          if git diff --quiet -- index.html; then
            echo "No change — skipping commit."
          else
            STAMP="$(date -u +'%Y-%m-%d %H:%MZ')"
            MSG="FBS Monitor rebuild ${STAMP}"
            if [ -n "${FALLBACK_NOTE:-}" ]; then MSG="${MSG} — ${FALLBACK_NOTE}"; fi
            git add index.html
            git commit -m "${MSG}"
            # Another run (or a local push) may have advanced main since checkout —
            # rebase and retry so concurrent pushes don't fail the run red.
            for i in 1 2 3; do
              git push && break
              [ "$i" = 3 ] && exit 1
              # rebase -X theirs keeps the commit being replayed (our fresh index.html)
              git pull --rebase -X theirs origin main
            done
          fi

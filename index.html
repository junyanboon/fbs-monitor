<!doctype html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta charset="utf-8">
<title>FBS Studio Monitor — Dance Annex</title>
<!-- Same "pulse tile" icon as site/favicon.svg, inlined so the artifact copy is self-contained -->
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect x="1" y="1" width="30" height="30" rx="7" fill="%232c7a4e"/><polyline points="5,16 11,16 14,9 18,23 21,16 27,16" fill="none" stroke="%23f4f2ee" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>'>
<style>
  /* Palette: Day Sheet system (junyanboon.github.io/day-sheet) — paper ground,
     purple brand, act/wait/hot/done semantics. Light-first, like the Day Sheet. */
  :root{
    --ink:#f5f4f0; --scrim:#fbfaf7; --scrim-2:#edebe4; --line:#dedbd3;
    --chalk:#191715; --chalk-dim:#716c64; --chalk-faint:#a09a90;
    --tungsten:#5b2fd4; --tungsten-soft:rgba(91,47,212,.09);
    --ok:#2c7a4e; --watch:#b06c00; --crit:#c23a2b;
    --ok-bg:#e2efe7; --watch-bg:#f6ead6; --crit-bg:#f9e6e2;
    --shadow:0 6px 18px rgba(25,23,21,.07);
    --disp:"Avenir Next Condensed","Arial Narrow","Helvetica Neue",sans-serif;
    --sans:"Avenir Next",Avenir,Seravek,"Segoe UI",Ubuntu,sans-serif;
    --body:Seravek,"Avenir Next","Segoe UI",Ubuntu,sans-serif;
    --mono:"SF Mono",ui-monospace,"Cascadia Mono",Menlo,monospace;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --ink:#141210; --scrim:#1a1815; --scrim-2:#211e1a; --line:#33302b;
      --chalk:#ece8e1; --chalk-dim:#979187; --chalk-faint:#6e6860;
      --tungsten:#a685f0; --tungsten-soft:rgba(166,133,240,.14);
      --ok:#6fbd92; --watch:#e2a552; --crit:#e8796a;
      --ok-bg:#16291f; --watch-bg:#33270f; --crit-bg:#3a1c17;
      --shadow:0 8px 24px rgba(0,0,0,.4);
    }
  }
  :root[data-theme="light"]{
    --ink:#f5f4f0; --scrim:#fbfaf7; --scrim-2:#edebe4; --line:#dedbd3;
    --chalk:#191715; --chalk-dim:#716c64; --chalk-faint:#a09a90;
    --tungsten:#5b2fd4; --tungsten-soft:rgba(91,47,212,.09);
    --ok:#2c7a4e; --watch:#b06c00; --crit:#c23a2b;
    --ok-bg:#e2efe7; --watch-bg:#f6ead6; --crit-bg:#f9e6e2;
    --shadow:0 6px 18px rgba(25,23,21,.07);
  }
  :root[data-theme="dark"]{
    --ink:#141210; --scrim:#1a1815; --scrim-2:#211e1a; --line:#33302b;
    --chalk:#ece8e1; --chalk-dim:#979187; --chalk-faint:#6e6860;
    --tungsten:#a685f0; --tungsten-soft:rgba(166,133,240,.14);
    --ok:#6fbd92; --watch:#e2a552; --crit:#e8796a;
    --ok-bg:#16291f; --watch-bg:#33270f; --crit-bg:#3a1c17;
    --shadow:0 8px 24px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--ink);color:var(--chalk);font-family:var(--body);font-size:15px;line-height:1.5;
       -webkit-font-smoothing:antialiased;padding:0 0 64px}

  header{position:sticky;top:0;z-index:30;background:linear-gradient(var(--ink) 82%,transparent);
         padding:22px 28px 18px;display:flex;align-items:baseline;gap:26px;flex-wrap:wrap}
  .brand{font-family:var(--sans);font-weight:600;letter-spacing:.3em;text-transform:uppercase;
         font-size:11.5px;color:var(--chalk-dim)}
  h1{font-family:var(--disp);font-weight:800;font-size:clamp(30px,4.6vw,52px);margin:0;letter-spacing:.01em;
     text-transform:uppercase;line-height:.95;text-wrap:balance}
  h1 em{font-style:normal;color:var(--tungsten)}
  .clock{margin-left:auto;font-family:var(--mono);font-size:clamp(20px,3vw,30px);font-variant-numeric:tabular-nums;
         color:var(--chalk);display:flex;align-items:baseline;gap:10px}
  .clock small{font-family:var(--body);font-size:12px;color:var(--chalk-dim);letter-spacing:.08em;text-transform:uppercase}
  .clock .dot{width:9px;height:9px;border-radius:50%;background:var(--tungsten);align-self:center;
              animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 var(--tungsten-soft)}50%{opacity:.55;box-shadow:0 0 0 7px transparent}}
  @media (prefers-reduced-motion: reduce){ .clock .dot{animation:none} .nowline::after{animation:none} }

  main{max-width:1320px;margin:0 auto;padding:0 28px}

  .pulse{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:6px 0 26px}
  .stat{background:var(--scrim);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
  .stat b{display:block;font-family:var(--disp);font-size:32px;font-weight:800;line-height:1.1;
          font-variant-numeric:tabular-nums}
  .stat span{font-family:var(--sans);font-weight:600;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--chalk-dim)}
  .stat.bad b{color:var(--crit)} .stat.good b{color:var(--ok)}

  .lane-label{font-family:var(--sans);font-weight:600;font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;
              color:var(--chalk-dim);margin:26px 0 10px;display:flex;align-items:center;gap:10px}
  .lane-label::after{content:"";flex:1;height:1px;background:var(--line)}
  .lane-label .crit-note{color:var(--crit);letter-spacing:.06em}

  /* now & next */
  .nowlane{display:grid;gap:10px}
  .now-card{display:grid;grid-template-columns:6px 1fr auto;gap:0 16px;background:var(--scrim);
            border:1px solid var(--line);border-radius:10px;overflow:hidden;align-items:center}
  .now-card .stripe{height:100%;background:var(--ok)}
  .now-card.flagged .stripe{background:var(--crit)}
  .now-card.next .stripe{background:var(--line)}
  .now-card .txt{padding:11px 0}
  .now-card .txt .row1{display:flex;gap:9px;align-items:baseline;flex-wrap:wrap}
  .now-card .studio-tag{font-family:var(--mono);font-size:11px;background:var(--scrim-2);
                        border:1px solid var(--line);border-radius:5px;padding:1px 7px;color:var(--chalk-dim)}
  .now-card strong{font-weight:600}
  .now-card .txt .row2{font-family:var(--mono);font-size:11.5px;color:var(--chalk-dim);
                       font-variant-numeric:tabular-nums;margin-top:2px}
  .now-card .row2 .flag{color:var(--crit);font-family:var(--body);letter-spacing:.04em}
  .now-card .count{padding:0 18px;text-align:right}
  .now-card .count b{font-family:var(--disp);font-size:26px;font-weight:800;color:var(--ok);
                     font-variant-numeric:tabular-nums;white-space:nowrap}
  .now-card.next .count b{color:var(--chalk)}
  .now-card.flagged .count b{color:var(--ok)}
  .now-card .count span{display:block;font-size:10.5px;color:var(--chalk-faint);letter-spacing:.07em;text-transform:uppercase}
  .all-clear{background:var(--ok-bg);border:1px solid var(--line);border-radius:10px;padding:14px 18px;color:var(--ok);
             font-weight:600}

  /* monitoring ledger */
  .ledgerwrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--scrim)}
  table.ledger{width:100%;border-collapse:collapse;min-width:760px;font-size:13.5px}
  .ledger th{font-family:var(--sans);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--chalk-faint);
             text-align:left;font-weight:600;padding:11px 14px;border-bottom:1px solid var(--line)}
  .ledger td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:top}
  .ledger tr:last-child td{border-bottom:none}
  .ledger .t{font-family:var(--mono);font-size:12px;font-variant-numeric:tabular-nums;white-space:nowrap}
  .ledger .arr{color:var(--ok);font-weight:600} .ledger .dep{color:var(--chalk-dim)}
  .ledger .dash{color:var(--chalk-faint)}
  .ledger tr.flagged td{background:var(--crit-bg)}
  .ledger .who-cell strong{font-weight:600}
  .subflag{display:block;font-size:11px;color:var(--crit);letter-spacing:.04em;margin-top:1px}
  .chip{font-family:var(--sans);font-size:10px;letter-spacing:.06em;padding:2px 7px;border-radius:99px;font-weight:600;text-transform:uppercase;
        display:inline-block}
  .chip.ok{background:var(--ok-bg);color:var(--ok)}
  .chip.watch{background:var(--watch-bg);color:var(--watch)}
  .chip.crit{background:var(--crit-bg);color:var(--crit)}
  .chip.type{background:var(--tungsten-soft);color:var(--tungsten)}
  .chip.plain{background:var(--scrim-2);border:1px solid var(--line);color:var(--chalk-dim)}

  /* board */
  .boardwrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--scrim)}
  .board{display:grid;min-width:980px;position:relative}
  .studio-h{position:sticky;top:0;background:var(--scrim-2);border-bottom:1px solid var(--line);
            padding:12px 14px;z-index:5}
  .studio-h h2{margin:0;font-family:var(--disp);font-weight:800;font-size:22px;letter-spacing:.04em;text-transform:uppercase}
  .studio-h .sub{font-size:11.5px;color:var(--chalk-dim);letter-spacing:.07em;text-transform:uppercase}
  .timecol{border-right:1px solid var(--line)}
  .timecol .cell, .col .slot{height:52px}
  .timecol .cell{font-family:var(--mono);font-size:11px;color:var(--chalk-faint);text-align:right;
                 padding:2px 8px 0 0;font-variant-numeric:tabular-nums;border-top:1px solid transparent}
  .col{position:relative;border-right:1px solid var(--line)}
  .col:last-child{border-right:none}
  .col .slot{border-top:1px dashed var(--line)}
  .booking{position:absolute;left:7px;right:7px;border-radius:8px;padding:7px 10px 6px;overflow:hidden;
           background:var(--scrim-2);border:1px solid var(--line);border-left:3px solid var(--tungsten);
           box-shadow:var(--shadow)}
  .booking.plain{border-left-color:var(--chalk-faint)}
  .booking.monitor{border-left-style:dashed}
  .booking.cleaning{background:repeating-linear-gradient(-45deg,var(--scrim-2) 0 7px,var(--scrim) 7px 14px);
                    border-left-color:var(--chalk-faint);border-left-style:dotted;box-shadow:none}
  .booking.done{opacity:.5}
  .booking.live{border-color:var(--tungsten);box-shadow:0 0 0 1px var(--tungsten),var(--shadow)}
  .booking.flagged{border-color:var(--crit);box-shadow:0 0 0 1px var(--crit),var(--shadow)}
  .booking .who{font-weight:600;font-size:13px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .booking .when{font-family:var(--mono);font-size:11px;color:var(--chalk-dim);font-variant-numeric:tabular-nums}
  .booking .when .arr{color:var(--ok)} .booking .when .flag{color:var(--crit);font-family:var(--body)}
  .chips{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
  .nowline{position:absolute;left:0;right:0;height:0;border-top:2px solid var(--tungsten);z-index:8;pointer-events:none}
  .nowline::before{content:"";position:absolute;left:-1px;top:-5px;width:8px;height:8px;border-radius:50%;
                   background:var(--tungsten)}
  .nowline::after{content:"";position:absolute;inset:-2px 0 auto 0;height:2px;background:var(--tungsten);
                  filter:blur(4px);opacity:.7;animation:pulse 2.4s ease-in-out infinite}

  /* staff coverage */
  .staffcol{position:relative;border-right:1px solid var(--line);background:var(--tungsten-soft)}
  .staffcol .slot{border-top:1px dashed var(--line)}
  .staffblock{position:absolute;left:5px;right:5px;border-radius:8px;padding:6px 8px 5px;overflow:hidden;
              background:var(--tungsten);color:#fff;box-shadow:var(--shadow)}
  .staffblock.shift{background:var(--scrim-2);color:var(--chalk-dim);border:1px dashed var(--tungsten);box-shadow:none}
  .staffblock .who{font-weight:600;font-size:12.5px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .staffblock .when{font-family:var(--mono);font-size:10.5px;opacity:.85;font-variant-numeric:tabular-nums}
  .coverband{position:absolute;right:0;background:var(--tungsten-soft);pointer-events:none;z-index:1}
  .booking{z-index:2}
  .chip.cov-ok{background:var(--ok-bg);color:var(--ok)}
  .chip.cov-part{background:var(--watch-bg);color:var(--watch)}
  .chip.cov-no{background:var(--crit-bg);color:var(--crit)}

  footer{max-width:1320px;margin:26px auto 0;padding:0 28px;color:var(--chalk-faint);font-size:12.5px;
         display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .legend{display:flex;gap:16px;flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .swatch{width:14px;height:10px;border-radius:3px;display:inline-block}
</style>
</head>
<body>

<header>
  <div>
    <div class="brand">Dance Annex · Front-of-Building Support</div>
    <h1 id="daytitle">FBS Studio Monitor</h1>
  </div>
  <div class="clock"><span class="dot" aria-hidden="true"></span><span id="clock">--:--</span><small>Toronto</small></div>
</header>

<main>
  <section class="pulse" id="pulse" aria-label="Day pulse"></section>

  <p class="lane-label">Now &amp; next up</p>
  <div class="nowlane" id="nowlane"></div>

  <p class="lane-label">Arrivals &amp; departures <span class="crit-note" id="flagnote"></span></p>
  <div class="ledgerwrap"><table class="ledger" id="ledger"></table></div>

  <p class="lane-label">Today's board</p>
  <div class="boardwrap"><div class="board" id="board"></div></div>
</main>

<footer>
  <div class="legend">
    <span><span class="swatch" style="background:var(--tungsten)"></span>Monitored (FBS · Monitor · Viewing)</span>
    <span><span class="swatch" style="background:var(--chalk-faint)"></span>Regular booking</span>
    <span><span class="swatch" style="background:repeating-linear-gradient(-45deg,var(--chalk-faint) 0 3px,transparent 3px 6px)"></span>Cleaning</span>
    <span><span class="swatch" style="background:var(--tungsten-soft);border:1px solid var(--tungsten)"></span>Staff on-site (coverage)</span>
    <span>↓ arrived · ↑ departed</span>
  </div>
  <div id="stamp"></div>
</footer>

const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
document.getElementById('daytitle').innerHTML = "FBS Studio <em>Monitor</em> — " + esc(DATA.date);
document.getElementById('stamp').textContent = "Data refreshed " + DATA.generatedAt +
  " · arrivals read from the FBS AI Support board (alarm disarm/arm)";

const E = DATA.events;
const hm = t => `${String(Math.floor(t)).padStart(2,"0")}:${String(Math.round((t%1)*60)).padStart(2,"0")}`;
const parseHM = s => { if(!s) return null; const m=s.match(/^(\d{1,2}):(\d{2})$/); return m? +m[1]+ +m[2]/60 : null; };
const dur = h => { const m=Math.round(h*60); return m>=60? `${Math.floor(m/60)}h ${String(m%60).padStart(2,"0")}m` : `${m} min`; };
const GRACE = 10/60; // minutes past start before a missing arrival flags
const STAFF = DATA.staff || []; // on-site coverage blocks from the Staff Scheduling calendar

/* Presence-based coverage: a monitored booking (tier != null) is Covered when the
   union of staff on-site blocks spans its window; Partial shows uncovered minutes. */
function coverageOf(e){
  if(e.kind!=="booking" || !e.tier) return null;
  const segs = STAFF.map(s=>[Math.max(s.start,e.start), Math.min(s.end,e.end)])
                    .filter(([a,b])=>b>a).sort((a,b)=>a[0]-b[0]);
  let covered=0, cursor=e.start, names=new Set();
  for(const [a,b] of segs){ const from=Math.max(a,cursor); if(b>from){covered+=b-from; cursor=b;} }
  STAFF.forEach(s=>{ if(Math.min(s.end,e.end)>Math.max(s.start,e.start)) names.add(s.name); });
  const total=e.end-e.start, gap=Math.round((total-covered)*60);
  const who=[...names].join(" · ");
  if(covered<=0.004) return {cls:"cov-no", label:"No coverage", gap:Math.round(total*60), who:""};
  if(gap<=1) return {cls:"cov-ok", label:"Covered"+(who?" · "+who:""), gap:0, who};
  return {cls:"cov-part", label:`Partial · ${gap}m gap`, gap, who};
}

function torontoNow(){ const d=new Date(new Date().toLocaleString("en-US",{timeZone:"America/Toronto"}));
  return {t: d.getHours()+d.getMinutes()/60, hhmm: String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")}; }

function stateOf(e, now){
  const arr = parseHM(e.arrived), dep = parseHM(e.departed);
  const flagged = e.kind==="booking" && !arr && now > e.start + GRACE && now < e.end + 1;
  if(dep && dep >= e.start) return {label:"Complete", cls:"ok", flagged:false};
  if(now >= e.end) return arr ? {label:"Complete", cls:"ok", flagged:false}
                              : {label:"Ended", cls:"plain", flagged};
  if(now >= e.start) return arr ? {label:"In studio", cls:"type", flagged:false}
                                : {label:"Upcoming", cls:"plain", flagged};
  return {label:"Upcoming", cls:"plain", flagged:false};
}

function render(){
  const now = torontoNow();
  $('#clock').textContent = now.hhmm;
  const n = now.t;

  /* pulse */
  const inNow = E.filter(e=>e.start<=n && n<e.end).length;
  const flags = E.filter(e=>stateOf(e,n).flagged).length;
  const tier = t => E.filter(e=>e.tier===t).length;
  $('#pulse').innerHTML = [
    {n:inNow, l:"in studio now", cls: inNow?"good":""},
    {n:E.filter(e=>e.kind==="booking").length, l:"bookings today"},
    {n:tier("FBS"), l:"FBS"}, {n:tier("Monitor"), l:"monitor"}, {n:tier("Viewing"), l:"viewing"},
    {n:E.filter(e=>{const c=coverageOf(e); return c && c.gap>0;}).length, l:"coverage gaps",
     cls: E.some(e=>{const c=coverageOf(e); return c && c.gap>0;})?"bad":"good"},
    {n:flags, l:"⚠ flags", cls: flags?"bad":"good"}
  ].map(s=>`<div class="stat ${s.cls||""}"><b>${s.n}</b><span>${s.l}</span></div>`).join("");

  /* now & next */
  const cur = E.filter(e=>e.start<=n && n<e.end).sort((a,b)=>a.end-b.end);
  const nxt = E.filter(e=>e.start>n).sort((a,b)=>a.start-b.start).slice(0,2);
  const card = (e, isNext) => {
    const st = stateOf(e,n);
    return `<div class="now-card ${isNext?"next":""} ${st.flagged?"flagged":""}">
      <div class="stripe"></div>
      <div class="txt">
        <div class="row1"><span class="studio-tag">${e.studio}</span><strong>${esc(e.who)}</strong>
          <span class="chip ${e.kind==="cleaning"?"plain":e.tier?"type":"plain"}">${e.kind==="cleaning"?"Cleaning":e.tier||"Booking"}</span></div>
        <div class="row2">${hm(e.start)}–${hm(e.end)}${e.arrived?` · <span style="color:var(--ok)">↓ ${e.arrived}</span>`:""}${st.flagged?` · <span class="flag">⚠ no arrival logged</span>`:""}${(cv=>cv?` · <span class="chip ${cv.cls}">${esc(cv.label)}</span>`:"")(coverageOf(e))}</div>
      </div>
      <div class="count"><b>${isNext? dur(e.start-n) : dur(e.end-n)}</b><span>${isNext?"until start":"left"}</span></div>
    </div>`;
  };
  $('#nowlane').innerHTML = (cur.length||nxt.length)
    ? cur.map(e=>card(e,false)).join("") + nxt.map(e=>card(e,true)).join("")
    : `<div class="all-clear">Nothing running or upcoming — the day is done.</div>`;

  /* ledger */
  $('#flagnote').textContent = flags ? `⚠ ${flags} need attention` : "";
  const rows = E.filter(e=>e.kind==="booking").sort((a,b)=>a.start-b.start).map(e=>{
    const st = stateOf(e,n);
    return `<tr class="${st.flagged?"flagged":""}">
      <td class="t">${hm(e.start)}–${hm(e.end)}</td>
      <td><span class="chip plain">${e.studio}</span></td>
      <td class="who-cell"><strong>${esc(e.who)}</strong> <span class="chip ${e.tier?"type":"plain"}">${e.tier||"Booking"}</span>
        ${e.tier&&e.tier!=="Viewing"&&!e.gtg?` <span class="chip ${st.label==="Complete"?"watch":"crit"}">No GTG</span>`:""}</td>
      <td class="t">${e.arrived?`<span class="arr">↓ ${e.arrived}</span>`:`<span class="dash">—</span>`}</td>
      <td class="t">${e.departed?`<span class="dep">↑ ${e.departed}</span>`:`<span class="dash">—</span>`}</td>
      <td>${(cv=>cv?`<span class="chip ${cv.cls}">${esc(cv.label)}</span>`:`<span class="dash">—</span>`)(coverageOf(e))}</td>
      <td><span class="chip ${st.cls}">${st.label}</span>${st.flagged?`<span class="subflag">⚠ no arrival logged</span>`:""}</td>
    </tr>`;
  }).join("");
  $('#ledger').innerHTML = `<thead><tr><th>Time</th><th>Studio</th><th>Booking</th><th>Arrived</th><th>Departed</th><th>Coverage</th><th>Status</th></tr></thead><tbody>${rows}</tbody>`;

  /* board */
  const lo = Math.min(9, ...E.map(e=>Math.floor(e.start)));
  const hi = Math.max(lo+8, ...E.map(e=>Math.ceil(e.end)));
  const HRS=[]; for(let h=lo;h<=hi;h++) HRS.push(h);
  const SLOT=52, yOf = t => (t-lo)*SLOT+46;
  const board = document.getElementById('board');
  const RAIL = STAFF.length ? 118 : 0;
  board.style.gridTemplateColumns = `56px ${RAIL?RAIL+"px ":""}repeat(${DATA.studios.length}, minmax(170px,1fr))`;
  let html = `<div class="timecol"><div class="studio-h" style="height:46px"></div>` +
    HRS.map(h=>`<div class="cell">${String(h%24).padStart(2,"0")}:00</div>`).join("") + `</div>`;
  if(RAIL){
    html += `<div class="staffcol">
      <div class="studio-h" style="height:46px"><h2>Staff</h2><div class="sub">On-site</div></div>` +
      HRS.slice(0,-1).map(()=>`<div class="slot"></div>`).join("") +
      STAFF.map(s=>`<div class="staffblock ${s.role==="Open"||s.role==="Close"?"shift":""}"
          style="top:${yOf(s.start)}px;height:${Math.max((s.end-s.start)*SLOT-6,26)}px">
        <div class="who">${esc(s.name)}${s.role?` · ${esc(s.role)}`:""}</div>
        <div class="when">${hm(s.start)}–${hm(s.end)}</div>
      </div>`).join("") + `</div>`;
  }
  for(const s of DATA.studios){
    html += `<div class="col">
      <div class="studio-h" style="height:46px"><h2>${s.name}</h2><div class="sub">${s.sub||""}</div></div>` +
      HRS.slice(0,-1).map(()=>`<div class="slot"></div>`).join("") +
      E.filter(e=>e.studio===s.id).map(e=>{
        const st = stateOf(e,n);
        const live = e.start<=n && n<e.end;
        const done = n>=e.end;
        const cls = ["booking", e.kind==="cleaning"?"cleaning":(e.tier?(e.tier==="Monitor"?"monitor":""):"plain"),
                     done?"done":"", live&&!st.flagged?"live":"", st.flagged?"flagged":""].join(" ");
        return `<div class="${cls}" style="top:${yOf(e.start)}px;height:${Math.max((e.end-e.start)*SLOT-6,42)}px">
          <div class="who">${esc(e.who)}</div>
          <div class="when">${hm(e.start)}–${hm(e.end)}${e.arrived?` <span class="arr">↓${e.arrived}</span>`:""}${e.departed?` ↑${e.departed}`:""}${st.flagged?` <span class="flag">⚠</span>`:""}</div>
          ${e.tier?(cv=>`<div class="chips"><span class="chip type">${e.tier}</span>${e.tier!=="Viewing"?(e.gtg?`<span class="chip ok">GTG ✓</span>`:`<span class="chip watch">No GTG</span>`):""}${cv?(cv.gap>0?`<span class="chip ${cv.cls}">${cv.cls==="cov-no"?"No cover":`Gap ${cv.gap}m`}</span>`:`<span class="chip cov-ok">Cover ✓</span>`):""}</div>`)(coverageOf(e)):""}
        </div>`;
      }).join("") + `</div>`;
  }
  board.innerHTML = html;
  for(const s of STAFF){
    const band = document.createElement('div'); band.className='coverband';
    band.style.left = (56+RAIL)+"px"; band.style.top = yOf(s.start)+"px";
    band.style.height = (s.end-s.start)*SLOT+"px";
    board.appendChild(band);
  }
  if(n>=lo && n<=hi){
    const line = document.createElement('div'); line.className='nowline'; line.style.top = yOf(n)+"px";
    board.appendChild(line);
  }
}
render(); setInterval(render, 30000);
</script>

</body>
